# Railway configuration for the API service (server/).
#
# HOW TO SET UP TWO SERVICES ON RAILWAY
# ──────────────────────────────────────
# Railway project → create two services, both pointing to this repo.
# Configure each service in the Railway dashboard:
#
#   Service 1 — API (this file is the default config):
#     Root Directory : /   (repo root)
#     Builder        : Dockerfile
#     Dockerfile path: Dockerfile.server
#
#   Service 2 — SSR Client:
#     Root Directory : /   (repo root)
#     Builder        : Dockerfile
#     Dockerfile path: Dockerfile.client
#     Health check   : /health
#
# See server/.env.example and client/.env.example for required variables.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.server"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
